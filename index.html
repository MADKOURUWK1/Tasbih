<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية | أ.د حسن مدكور</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary-green: #27ae60; --light-green: #e8f5e9; --text-dark: #2c3e50; }
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background-color: #f0f4f3; font-family: 'Amiri', serif; color: var(--text-dark); min-height: 100vh; }
        .header { text-align: center; margin-top: 25px; }
        h1 { font-family: 'Aref Ruqaa', serif; color: var(--primary-green); margin-bottom: 5px; font-size: 1.6rem; }
        .sub-title { font-size: 1.1rem; color: #666; margin-bottom: 10px; }
        .container { width: 92%; max-width: 450px; background: white; padding: 20px; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.08); text-align: center; display: flex; flex-direction: column; }
        
        /* الزر العلوي */
        .main-btn-container { order: 1; margin: 20px 0 30px 0; display: flex; justify-content: center; }
        .tasbih-btn {
            width: 180px; height: 180px; border-radius: 50%; border: 8px solid var(--light-green); background: white;
            font-family: 'Aref Ruqaa', serif; font-size: 1.8rem; color: var(--primary-green); cursor: pointer;
            box-shadow: 0 10px 25px rgba(39, 174, 96, 0.15); transition: all 0.1s ease; outline: none;
            -webkit-tap-highlight-color: transparent; padding: 20px; display: flex; align-items: center; justify-content: center;
            line-height: 1.3; overflow: hidden; text-align: center;
        }
        .tasbih-btn.long-text { font-size: 1.05rem; padding: 10px; }
        .tasbih-btn:active { transform: scale(0.92); background: var(--primary-green); color: white; border-color: #2ecc71; }

        /* الأشرطة */
        .bars-section { order: 2; }
        .tasbih-item { margin-bottom: 12px; text-align: right; }
        .bar-container { width: 100%; height: 42px; background: #f9f9f9; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid #eee; }
        .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #2ecc71, #27ae60); transition: width 0.2s ease; }
        .bar-text { position: absolute; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; box-sizing: border-box; font-weight: bold; z-index: 2; font-size: 0.95rem; }
        .small-text-bar { font-size: 0.65rem !important; line-height: 1.1; max-width: 80%; }

        .footer-counter { margin-top: auto; padding: 25px; font-size: 0.9rem; color: #888; text-align: center; }
        .global-num { font-weight: bold; color: var(--primary-green); font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>صدقة جارية</h1>
        <div class="sub-title">أ.د / حسن محمد فوزي مدكور</div>
    </div>

    <div class="container">
        <div class="main-btn-container">
            <button id="action-btn" class="tasbih-btn" onclick="handleTap()">سبحان الله</button>
        </div>

        <div class="bars-section">
            <div class="tasbih-item"><div class="bar-container"><div class="bar-text"><span>سبحان الله</span><span id="count1">0/33</span></div><div id="fill1" class="bar-fill"></div></div></div>
            <div class="tasbih-item"><div class="bar-container"><div class="bar-text"><span>الحمد لله</span><span id="count2">0/33</span></div><div id="fill2" class="bar-fill"></div></div></div>
            <div class="tasbih-item"><div class="bar-container"><div class="bar-text"><span>الله أكبر</span><span id="count3">0/33</span></div><div id="fill3" class="bar-fill"></div></div></div>
            <div class="tasbih-item" id="item4" style="opacity: 0.2;">
                <div class="bar-container">
                    <div class="bar-text"><span class="small-text-bar">لا إله إلا الله وحده لا شريك له، له الملك وله الحمد، وهو على كل شيء قدير</span><span id="count4">0/1</span></div>
                    <div id="fill4" class="bar-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-counter">
        إجمالي عدد الختمات (المائة كاملة): <span id="global-counter" class="global-num">...</span>
    </div>

    <script>
        // --- بيانات Firebase الخاصة بك مدمجة أدناه ---
        const firebaseConfig = {
          apiKey: "AIzaSyA4DfsYFWxEdOy6FImMjlaY3XpOjui82Gk",
          authDomain: "tasbih-61228.firebaseapp.com",
          databaseURL: "https://tasbih-61228-default-rtdb.firebaseio.com",
          projectId: "tasbih-61228",
          storageBucket: "tasbih-61228.firebasestorage.app",
          messagingSenderId: "11053852127",
          appId: "1:11053852127:web:909ab67300e9bb13fa906a"
        };

        // تشغيل التطبيق
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const globalRef = database.ref('tasbih_complete_count');

        // جلب العداد العام وعرضه
        globalRef.on('value', (snapshot) => {
            const val = snapshot.val() || 0;
            document.getElementById('global-counter').innerText = val.toLocaleString('ar-EG');
        });

        let currentStep = 1;
        let counts = { 1: 0, 2: 0, 3: 0, 4: 0 };
        const limits = { 1: 33, 2: 33, 3: 33, 4: 1 };
        const btnLabels = { 
            1: "سبحان الله", 2: "الحمد لله", 3: "الله أكبر", 
            4: "لا إله إلا الله وحده لا شريك له، له الملك وله الحمد، وهو على كل شيء قدير" 
        };

        function handleTap() {
            if (currentStep > 4) return;

            counts[currentStep]++;
            updateUI();

            if (counts[currentStep] >= limits[currentStep]) {
                if (currentStep < 4) {
                    currentStep++;
                    document.getElementById(`item${currentStep}`).style.opacity = "1";
                    const btn = document.getElementById('action-btn');
                    btn.innerText = btnLabels[currentStep];
                    if (currentStep === 4) btn.classList.add('long-text');
                } else {
                    // زيادة العداد العام عند انتهاء الـ 100
                    sendToFirebase();
                    finish();
                }
            }
        }

        function updateUI() {
            const fill = document.getElementById(`fill${currentStep}`);
            const text = document.getElementById(`count${currentStep}`);
            const percentage = (counts[currentStep] / limits[currentStep]) * 100;
            fill.style.width = percentage + "%";
            text.innerText = `${counts[currentStep]}/${limits[currentStep]}`;
        }

        function sendToFirebase() {
            globalRef.transaction((currentValue) => {
                return (currentValue || 0) + 1;
            });
        }

        function finish() {
            const btn = document.getElementById('action-btn');
            btn.innerText = "تقبل الله";
            btn.classList.remove('long-text');
            btn.style.background = "#27ae60";
            btn.style.color = "white";
            btn.disabled = true;
            setTimeout(() => {
                if(confirm("تمت المائة بحمد الله. العداد العام زاد الآن. هل تريد البدء مرة أخرى؟")) location.reload();
            }, 500);
        }
    </script>
</body>
</html>
